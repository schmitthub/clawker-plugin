# Reference: Go project config (based on clawker's own .clawker.yaml)
# Manually maintained — may lag behind schema. Fetch
# https://docs.clawker.dev/configuration for field-level details.
agent:
  editor: nano
  enable_shared_dir: true
  env:
    CLAWKER_TEST_DIR: .clawkerlocal/.test-tmp
  from_env:
    - GH_TOKEN
    - CONTEXT7_API_KEY
  # (agent.pre_run — every-start hook — is available but unused here; see
  # sample-node.yaml for a working example and SKILL.md for when to use it.)
# Per-harness overlay: env/hooks layered on the agent.* base when this
# harness is selected. `claude mcp add` needs the claude CLI, so it lives in
# the claude harness's post_init, not the harness-agnostic agent.post_init.
harnesses:
  claude:
    config:
      strategy: copy
    mount_projects: true
    post_init: |
      claude mcp add -s local serena -- uvx --from git+https://github.com/oraios/serena@e9d21915660a66f8532260c527ab6afae94a6bd5 serena start-mcp-server --context claude-code --project "$(pwd)" --enable-web-dashboard false
      claude mcp add -s user --header "CONTEXT7_API_KEY: $CONTEXT7_API_KEY" --transport http context7 https://mcp.context7.com/mcp
      claude mcp add -s user -t http deepwiki https://mcp.deepwiki.com/mcp
build:
  # Language stacks render into the shared base image. Every clawker
  # image builds from the pinned Debian substrate — there is no base-image
  # field; runtimes come from stacks, tools from packages/instructions.
  # (Node arrives via the claude harness's own node stack declaration —
  # declare `node` here too only if build steps need it in the base image.)
  stacks:
    - go
  instructions:
    root_run:
      - |-
        SYFT_VERSION=v1.42.3 && \
          ARCH=$(dpkg --print-architecture) && \
          case "$ARCH" in \
            amd64) SYFT_ARCH=amd64 ;; \
            arm64) SYFT_ARCH=arm64 ;; \
            armhf) SYFT_ARCH=armv7 ;; \
            *) \
              echo "Unsupported architecture for Syft: $ARCH" >&2; \
              exit 1; \
              ;; \
          esac && \
          SYFT_FILE="syft_${SYFT_VERSION#v}_linux_${SYFT_ARCH}.tar.gz" && \
          CHECKSUMS_FILE="syft_${SYFT_VERSION#v}_checksums.txt" && \
          curl -fsSLO "https://github.com/anchore/syft/releases/download/${SYFT_VERSION}/${SYFT_FILE}" && \
          curl -fsSLO "https://github.com/anchore/syft/releases/download/${SYFT_VERSION}/${CHECKSUMS_FILE}" && \
          grep " ${SYFT_FILE}\$" "${CHECKSUMS_FILE}" | sha256sum -c - && \
          tar -C /usr/local/bin -xzf "${SYFT_FILE}" syft && \
          rm -f "${SYFT_FILE}" "${CHECKSUMS_FILE}"
    user_run:
      - curl -LsSf https://astral.sh/uv/install.sh | sh
      - uv tool install pre-commit --with pre-commit-uv
      # The go stack puts go on PATH for build-time steps.
      - go install golang.org/x/tools/gopls@latest
      - go install gotest.tools/gotestsum@latest
      - go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@latest
      - go install golang.org/x/vuln/cmd/govulncheck@latest
      - go install golang.org/x/tools/cmd/goimports@latest
      - go install honnef.co/go/tools/cmd/staticcheck@latest
      - uv tool install semgrep
  packages:
    - git
    - curl
    - ripgrep
    - less
    - procps
    - sudo
    - fzf
    - zsh
    - man-db
    - unzip
    - gnupg2
    - iproute2
    - dnsutils
    - aggregate
    - jq
    - nano
    - vim
    - wget
    - gh
    - locales
    - locales-all
    - iputils-ping
    - shellcheck
security:
  docker_socket: false
  firewall:
    add_domains:
      - charm.land
      - code.gitea.io
      - golang.org
      - proxy.golang.org
      - sum.golang.org
      - gocloud.dev
      - gopkg.in
      - software.sslmate.com
      - cloud.google.com
      - sigs.k8s.io
      - google.golang.org
      - storage.googleapis.com
      - go.opentelemetry.io
      - go.uber.org
      - lukechampine.com
      - go.yaml.in
      - cel.dev
      - files.pythonhosted.org
      - code.claude.com
      - mcp.deepwiki.com
      - mcp.context7.com
      - pypi.org
      - semgrep.dev
      - registry.npmjs.org
      - github.com
      - api.github.com
      - release-assets.githubusercontent.com
      - docker.io
      - registry-1.docker.io
      - vuln.go.dev
      - production.cloudflare.docker.com
      - www.envoyproxy.io
      - goreleaser.com
      - astral.sh
      - nodejs.org
    rules:
      - action: allow
        dst: github.com
        port: 22
        proto: ssh
      - action: allow
        dst: raw.githubusercontent.com
        port: 443
        proto: https
        path_default: deny
        path_rules:
          - path: /anchore/syft/main/
            action: allow
          - path: /schmitthub/clawker/
            action: allow
          - path: /envoyproxy/
            action: allow
  git_credentials:
    copy_git_config: true
    forward_gpg: true
    forward_https: true
    forward_ssh: true
workspace:
  default_mode: bind
