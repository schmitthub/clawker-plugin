name: Update Plugin

on:
  workflow_call:
    inputs:
      plugin-name:
        description: "Plugin name as it appears in marketplace.json"
        required: true
        type: string
      sha:
        description: "Full 40-char commit SHA to pin the plugin to"
        required: true
        type: string
    secrets:
      marketplace-token:
        description: "PAT with write access to the marketplace repo"
        required: true

jobs:
  update-plugin:
    name: Update ${{ inputs.plugin-name }} → ${{ inputs.sha }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout marketplace
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          repository: schmitthub/claude-plugins
          token: ${{ secrets.marketplace-token }}

      - name: Validate inputs
        run: |
          if ! [[ "${{ inputs.sha }}" =~ ^[0-9a-f]{40}$ ]]; then
            echo "::error::Invalid SHA: must be 40 hex characters"
            exit 1
          fi

      - name: Resolve plugin source repo
        id: source
        run: |
          PLUGIN="${{ inputs.plugin-name }}"
          MARKETPLACE=".claude-plugin/marketplace.json"

          SOURCE=$(jq -r --arg name "$PLUGIN" \
            '.plugins[] | select(.name == $name).source' \
            "$MARKETPLACE")

          if [ "$SOURCE" = "null" ] || [ -z "$SOURCE" ]; then
            echo "::error::Plugin '$PLUGIN' not found in marketplace.json"
            exit 1
          fi

          URL=$(echo "$SOURCE" | jq -r '.url')
          PATH_IN_REPO=$(echo "$SOURCE" | jq -r '.path // ""')

          # gh api needs owner/repo shorthand, but .source.url may be a full
          # clone URL (https://, ssh://, git@). Normalize to owner/repo for API
          # calls; the original URL stays untouched in marketplace.json.
          GH_REPO=$(echo "$URL" | sed -E 's|^https?://github\.com/||; s|^ssh://git@github\.com/||; s|^git@github\.com:||; s|\.git$||')

          echo "url=$URL" >> "$GITHUB_OUTPUT"
          echo "gh-repo=$GH_REPO" >> "$GITHUB_OUTPUT"
          echo "path=$PATH_IN_REPO" >> "$GITHUB_OUTPUT"

      - name: Fetch plugin.json from source repo at target SHA
        id: version
        env:
          GH_TOKEN: ${{ secrets.marketplace-token }}
        run: |
          SHA="${{ inputs.sha }}"
          URL="${{ steps.source.outputs.url }}"
          PLUGIN_PATH="${{ steps.source.outputs.path }}"

          if [ -n "$PLUGIN_PATH" ]; then
            JSON_PATH="${PLUGIN_PATH}/.claude-plugin/plugin.json"
          else
            JSON_PATH=".claude-plugin/plugin.json"
          fi

          GH_REPO="${{ steps.source.outputs.gh-repo }}"
          VERSION=$(gh api "repos/${GH_REPO}/contents/${JSON_PATH}?ref=${SHA}" \
            --jq '.content' | base64 -d | jq -r '.version // empty')

          if [ -z "$VERSION" ]; then
            echo "::warning::No version field in plugin.json — SHA will be updated but version will not"
            echo "has_version=false" >> "$GITHUB_OUTPUT"
          else
            echo "version=$VERSION" >> "$GITHUB_OUTPUT"
            echo "has_version=true" >> "$GITHUB_OUTPUT"
            echo "Resolved version: $VERSION"
          fi

      - name: Update marketplace.json
        run: |
          PLUGIN="${{ inputs.plugin-name }}"
          SHA="${{ inputs.sha }}"
          VERSION="${{ steps.version.outputs.version }}"
          HAS_VERSION="${{ steps.version.outputs.has_version }}"
          MARKETPLACE=".claude-plugin/marketplace.json"

          if [ "$HAS_VERSION" = "true" ]; then
            jq --arg name "$PLUGIN" --arg sha "$SHA" --arg ver "$VERSION" \
              '(.plugins[] | select(.name == $name)) |=
                (.source.sha = $sha | .version = $ver)' \
              "$MARKETPLACE" > tmp.json && mv tmp.json "$MARKETPLACE"
            echo "Updated $PLUGIN to $SHA (version $VERSION)"
          else
            jq --arg name "$PLUGIN" --arg sha "$SHA" \
              '(.plugins[] | select(.name == $name).source.sha) = $sha' \
              "$MARKETPLACE" > tmp.json && mv tmp.json "$MARKETPLACE"
            echo "Updated $PLUGIN to $SHA (no version)"
          fi

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .claude-plugin/marketplace.json
          git diff --cached --quiet && echo "No changes" && exit 0
          git commit -m "release: ${{ inputs.plugin-name }} @ ${{ inputs.sha }}"
          git push
